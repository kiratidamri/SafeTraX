<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e3a5f">
  <title>SafeTraX – Edit profile</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <h1>SafeTraX</h1>
    <p style="font-size: 0.9rem; opacity: 0.95;">Edit your account</p>
  </header>

  <main class="container">
    <form id="profile-edit-form" action="profile.html" method="get">
      <div class="card">
        <h2>Personal information</h2>
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" placeholder="First and last name" required>
        <label for="dob">Date of birth</label>
        <input type="date" id="dob" name="dob" required>
        <label for="address">Address</label>
        <input type="text" id="address" name="address" placeholder="Street, city, state, ZIP" required>
        <label for="phone">Phone number</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required>
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" name="email" placeholder="you@example.com" required>
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" name="password" placeholder="Leave blank to keep current">
        <label for="confirm-password">Confirm password</label>
        <input type="password" id="confirm-password" name="confirm_password" placeholder="Leave blank to keep current">
      </div>
      <div class="card">
        <h2>Emergency contact</h2>
        <label for="emergency-name">Emergency contact name</label>
        <input type="text" id="emergency-name" name="emergency_name" placeholder="Full name" required>
        <label for="emergency-phone">Emergency contact phone</label>
        <input type="tel" id="emergency-phone" name="emergency_phone" placeholder="+1 (555) 000-0000" required>
      </div>
      <div class="card">
        <h2>Citizenship & physical</h2>
        <label for="citizenship">Citizenship</label>
        <select id="citizenship" name="citizenship" required>
          <option value="">Select country</option>
          <option value="US">United States</option>
          <option value="other">Other (specify in notes)</option>
        </select>
        <label for="height">Height (feet)</label>
        <input type="number" id="height" name="height" placeholder="e.g. 5.8" min="3" max="8" step="0.1">
        <label for="weight">Weight (lbs)</label>
        <input type="number" id="weight" name="weight" placeholder="e.g. 150" min="50" max="500">
        <label for="blood">Blood type</label>
        <select id="blood" name="blood">
          <option value="">Select</option>
          <option value="A+">A+</option>
          <option value="A-">A-</option>
          <option value="B+">B+</option>
          <option value="B-">B-</option>
          <option value="AB+">AB+</option>
          <option value="AB-">AB-</option>
          <option value="O+">O+</option>
          <option value="O-">O-</option>
        </select>
        <label for="race">Race / ethnicity</label>
        <input type="text" id="race" name="race" placeholder="Optional">
      </div>
      <div class="card">
        <h2>Health concerns</h2>
        <div class="health-checklist">
          <label><input type="checkbox" name="health" value="allergies"> Allergies</label>
          <label><input type="checkbox" name="health" value="diabetes"> Diabetes</label>
          <label><input type="checkbox" name="health" value="stroke"> History of stroke</label>
          <label><input type="checkbox" name="health" value="hypertension"> High blood pressure</label>
          <label><input type="checkbox" name="health" value="heart"> Heart condition</label>
          <label><input type="checkbox" name="health" value="asthma"> Asthma</label>
          <label><input type="checkbox" name="health" value="epilepsy"> Epilepsy</label>
          <label><input type="checkbox" name="health" value="kidney"> Kidney disease</label>
          <label><input type="checkbox" name="health" value="immune"> Weakened immune system</label>
          <label><input type="checkbox" name="health" value="pregnancy"> Pregnancy</label>
        </div>
        <label for="health-other" class="mt-2">Other health concerns</label>
        <textarea id="health-other" name="health_other" rows="2" placeholder="Describe any other conditions"></textarea>
      </div>
      <div class="card">
        <h2>Vaccination history</h2>
        <textarea id="vaccination" name="vaccination" rows="3" placeholder="List recent vaccines and dates"></textarea>
      </div>
      <div class="card">
        <h2>Additional note</h2>
        <textarea id="additional-note" name="additional_note" rows="3" placeholder="Any other information for travel safety"></textarea>
      </div>
      <div class="card consent-box">
        <h2>Consent</h2>
        <p style="font-size: 0.9rem;">Your consent and signature remain on file. Date last updated: <span id="sign-date"></span></p>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Save profile</button>
      <p class="text-center mt-2" style="font-size: 0.9rem;">
        <a href="profile.html">Cancel – back to profile</a>
      </p>
    </form>
  </main>

  <script>
    function getStored(key) { try { return localStorage.getItem('safetrax_' + key) || ''; } catch (e) { return ''; } }
    document.getElementById('name').value = getStored('name');
    document.getElementById('dob').value = getStored('dob');
    document.getElementById('address').value = getStored('address');
    document.getElementById('phone').value = getStored('phone');
    document.getElementById('signup-email').value = getStored('email');
    document.getElementById('emergency-name').value = getStored('emergency_name');
    document.getElementById('emergency-phone').value = getStored('emergency_phone');
    document.getElementById('citizenship').value = getStored('citizenship');
    document.getElementById('height').value = getStored('height');
    document.getElementById('weight').value = getStored('weight');
    document.getElementById('blood').value = getStored('blood');
    document.getElementById('race').value = getStored('race');
    document.getElementById('health-other').value = getStored('health_other');
    document.getElementById('vaccination').value = getStored('vaccination');
    document.getElementById('additional-note').value = getStored('additional_note');
    document.getElementById('sign-date').textContent = getStored('sign_date') || '—';
    ['allergies','diabetes','stroke','hypertension','heart','asthma','epilepsy','kidney','immune','pregnancy'].forEach(function(k) {
      var cb = document.querySelector('input[name="health"][value="' + k + '"]');
      if (cb && getStored('health_' + k) === 'on') cb.checked = true;
    });

    document.getElementById('profile-edit-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var form = this;
      var data = new FormData(form);
      data.forEach(function(value, key) {
        if (key === 'password' || key === 'confirm_password') { if (!value) return; }
        try { localStorage.setItem('safetrax_' + key, value); } catch (err) {}
      });
      try { localStorage.setItem('safetrax_sign_date', new Date().toLocaleDateString()); } catch (err) {}
      document.querySelectorAll('input[name="health"]').forEach(function(cb) {
        try { localStorage.setItem('safetrax_health_' + cb.value, cb.checked ? 'on' : ''); } catch (err) {}
      });
      window.location.href = 'profile.html';
    });
  </script>
</body>
</html>
