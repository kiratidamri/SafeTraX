<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e3a5f">
  <title>SafeTraX – Travel plan</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <h1>SafeTraX</h1>
    <p style="font-size: 0.9rem; opacity: 0.95;">Travel plan</p>
  </header>

  <main class="container">
    <form id="travel-form" action="recommendation.html" method="get">
      <div class="card">
        <h2>Destination</h2>
        <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.75rem;">Choose country. If US, select a state (e.g. CA).</p>
        <div id="destinations">
          <div class="destination-row" data-dest="1">
            <label for="country_1" class="sr-only">Country</label>
            <select name="country_1" id="country_1" class="country-select">
              <option value="">Select country</option>
            </select>
            <div class="state-wrap hidden" id="state-wrap-1">
              <label for="state_1" class="sr-only">State (US only)</label>
              <select name="state_1" id="state_1" class="state-select">
                <option value="">Select state</option>
                <option value="AL">Alabama</option>
                <option value="AK">Alaska</option>
                <option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="CT">Connecticut</option>
                <option value="DE">Delaware</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>
                <option value="HI">Hawaii</option>
                <option value="ID">Idaho</option>
                <option value="IL">Illinois</option>
                <option value="IN">Indiana</option>
                <option value="IA">Iowa</option>
                <option value="KS">Kansas</option>
                <option value="KY">Kentucky</option>
                <option value="LA">Louisiana</option>
                <option value="ME">Maine</option>
                <option value="MD">Maryland</option>
                <option value="MA">Massachusetts</option>
                <option value="MI">Michigan</option>
                <option value="MN">Minnesota</option>
                <option value="MS">Mississippi</option>
                <option value="MO">Missouri</option>
                <option value="MT">Montana</option>
                <option value="NE">Nebraska</option>
                <option value="NV">Nevada</option>
                <option value="NH">New Hampshire</option>
                <option value="NJ">New Jersey</option>
                <option value="NM">New Mexico</option>
                <option value="NY">New York</option>
                <option value="NC">North Carolina</option>
                <option value="ND">North Dakota</option>
                <option value="OH">Ohio</option>
                <option value="OK">Oklahoma</option>
                <option value="OR">Oregon</option>
                <option value="PA">Pennsylvania</option>
                <option value="RI">Rhode Island</option>
                <option value="SC">South Carolina</option>
                <option value="SD">South Dakota</option>
                <option value="TN">Tennessee</option>
                <option value="TX">Texas</option>
                <option value="UT">Utah</option>
                <option value="VT">Vermont</option>
                <option value="VA">Virginia</option>
                <option value="WA">Washington</option>
                <option value="WV">West Virginia</option>
                <option value="WI">Wisconsin</option>
                <option value="WY">Wyoming</option>
                <option value="OTHER">Other</option>
              </select>
            </div>
          </div>
        </div>
        <button type="button" class="btn btn-outline mt-1" id="add-destination">+ Add another destination</button>
      </div>

      <div class="card">
        <h2>Dates</h2>
        <label for="date-start">Start date</label>
        <input type="date" id="date-start" name="date_start" required>
        <label for="date-end">End date</label>
        <input type="date" id="date-end" name="date_end" required>
      </div>

      <div class="card">
        <h2>Primary transportation</h2>
        <select id="transport" name="transport" required>
          <option value="">Select</option>
          <option value="air">Air</option>
          <option value="car">Car</option>
          <option value="train">Train</option>
          <option value="bus">Bus</option>
          <option value="cruise">Cruise</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="card">
        <h2>Checklist before you go</h2>
        <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.75rem;">Immigration, health, law & weather</p>
        <div class="checklist-group">
          <h4>Immigration</h4>
          <div class="check-item"><input type="checkbox" name="check_immigration_visa" id="c1"><label for="c1">Visa / ESTA / entry requirements</label></div>
          <div class="check-item"><input type="checkbox" name="check_immigration_passport" id="c2"><label for="c2">Passport validity (6+ months)</label></div>
        </div>
        <div class="checklist-group">
          <h4>Health</h4>
          <div class="check-item"><input type="checkbox" name="check_health_vaccine" id="c3"><label for="c3">Vaccinations up to date</label></div>
          <div class="check-item"><input type="checkbox" name="check_health_insurance" id="c4"><label for="c4">Travel health insurance</label></div>
          <div class="check-item"><input type="checkbox" name="check_health_meds" id="c5"><label for="c5">Medications & prescriptions</label></div>
        </div>
        <div class="checklist-group">
          <h4>Law & regulations</h4>
          <div class="check-item"><input type="checkbox" name="check_law" id="c6"><label for="c6">Local laws and customs</label></div>
        </div>
        <div class="checklist-group">
          <h4>Weather</h4>
          <div class="check-item"><input type="checkbox" name="check_weather" id="c7"><label for="c7">Forecast and seasonal risks</label></div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Generate recommendation</button>
    </form>
  </main>

  <nav class="nav-bottom">
    <a href="index.html"><span class="icon-label">Home</span></a>
    <a href="travel-plan.html" class="active"><span class="icon-label">Travel plan</span></a>
    <a href="friends.html"><span class="icon-label">Friends</span></a>
    <a href="profile.html"><span class="icon-label">Profile</span></a>
    <a href="realtime.html"><span class="icon-label">Real-time</span></a>
  </nav>

    ];
    var countryOptions = '<option value="">Select country</option>' + countries.map(function(x){return '<option value="'+x.c+'">'+x.n+'</option>';}).join('');

    (function fillCountry1() {
      var sel = document.getElementById('country_1');
      countries.forEach(function(x) {
        var o = document.createElement('option');
        o.value = x.c;
        o.textContent = x.n;
        sel.appendChild(o);
      });
    })();

    function toggleStateWrap(countrySelect) {
      var row = countrySelect.closest('.destination-row');
      var stateWrap = row.querySelector('.state-wrap');
      var stateSelect = row.querySelector('.state-select');
      if (countrySelect.value === 'US') {
        stateWrap.classList.remove('hidden');
        if (stateSelect) stateSelect.removeAttribute('disabled');
      } else {
        stateWrap.classList.add('hidden');
        if (stateSelect) { stateSelect.value = ''; stateSelect.setAttribute('disabled', 'disabled'); }
      }
    }

    document.getElementById('country_1').addEventListener('change', function() { toggleStateWrap(this); });

    document.getElementById('add-destination').addEventListener('click', function() {
      count++;
      var row = document.createElement('div');
      row.className = 'destination-row';
      row.setAttribute('data-dest', count);
      row.innerHTML = '<label for="country_' + count + '" class="sr-only">Country</label><select name="country_' + count + '" id="country_' + count + '" class="country-select">' + countryOptions + '</select><div class="state-wrap hidden"><label for="state_' + count + '" class="sr-only">State (US only)</label><select name="state_' + count + '" id="state_' + count + '" class="state-select" disabled>' + stateOptions + '</select></div><button type="button" class="btn btn-outline remove-dest">Remove</button>';
      row.querySelector('.country-select').addEventListener('change', function() { toggleStateWrap(this); });
      row.querySelector('.remove-dest').addEventListener('click', function() { row.remove(); });
      document.getElementById('destinations').appendChild(row);
    });
  </script>
</body>
</html>
