<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e3a5f">
  <title>SafeTrax — Help & FAQ</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Chat layout ─────────────────────────────── */
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .chat-header {
      background: var(--primary);
      color: #fff;
      padding: 14px 16px 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-header a {
      color: #fff;
      font-size: 1.3rem;
      text-decoration: none;
      line-height: 1;
    }
    .chat-header-text h2 { color: #fff; font-size: 1rem; margin: 0; }
    .chat-header-text p  { font-size: 0.78rem; opacity: 0.8; margin: 0; }

    /* Avatar dot */
    .bot-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }

    /* ── Message list ────────────────────────────── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 82%;
      padding: 10px 13px;
      border-radius: 16px;
      font-size: 0.93rem;
      line-height: 1.45;
      word-break: break-word;
    }
    .msg.bot {
      background: var(--card-bg);
      color: var(--text);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
    }
    .msg.user {
      background: var(--accent);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg.error {
      background: #fff5f5;
      color: var(--danger);
      align-self: flex-start;
      border: 1px solid #feb2b2;
    }
    .msg.typing {
      background: var(--card-bg);
      align-self: flex-start;
      box-shadow: var(--shadow);
      padding: 12px 16px;
    }
    .typing-dots span {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      margin: 0 2px;
      animation: blink 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
      40%            { opacity: 1;   transform: scale(1);    }
    }

    /* ── Quick-reply chips ───────────────────────── */
    #quick-replies {
      padding: 6px 12px 4px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      flex-shrink: 0;
    }
    .chip {
      background: var(--card-bg);
      border: 1px solid var(--accent-light);
      color: var(--accent);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .chip:hover { background: var(--accent); color: #fff; }

    /* ── Input bar ───────────────────────────────── */
    .chat-input-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px 14px;
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #chat-input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 9px 14px;
      font-size: 0.93rem;
      font-family: var(--font);
      outline: none;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
    }
    #chat-input:focus { border-color: var(--accent); }
    #send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #send-btn:hover  { background: var(--primary-light); }
    #send-btn:active { background: var(--primary); }
    #send-btn svg { fill: #fff; width: 18px; height: 18px; }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    /* nav-bottom spacing */
    nav.nav-bottom { position: sticky; bottom: 0; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="chat-header">
    <a href="index.html" aria-label="Back">&#8592;</a>
    <div class="bot-avatar">&#129302;</div>
    <div class="chat-header-text">
      <h2>SafeTrax Assistant</h2>
      <p>Ask anything about travel safety</p>
    </div>
  </div>

  <!-- Messages -->
  <div id="chat-messages" role="log" aria-live="polite">
    <!-- Greeting injected by JS -->
  </div>

  <!-- Quick-reply chips -->
  <div id="quick-replies">
    <button class="chip" data-q="What is the risk score?">What is the risk score?</button>
    <button class="chip" data-q="What do CDC travel levels mean?">CDC travel levels</button>
    <button class="chip" data-q="How do I make a travel plan?">Make a travel plan</button>
    <button class="chip" data-q="What vaccinations might I need?">Vaccinations</button>
    <button class="chip" data-q="How does real-time tracking work?">Real-time tracking</button>
  </div>

  <!-- Input -->
  <div class="chat-input-bar">
    <textarea id="chat-input" rows="1" placeholder="Ask a question…" aria-label="Chat input"></textarea>
    <button id="send-btn" aria-label="Send">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

  <!-- Bottom nav (optional — shown after login) -->
  <nav class="nav-bottom" id="nav-bottom">
    <a href="index.html"><span class="icon-label">Home</span></a>
    <a href="travel-plan.html"><span class="icon-label">Travel plan</span></a>
    <a href="friends.html"><span class="icon-label">Friends</span></a>
    <a href="faq.html" class="active"><span class="icon-label">Help</span></a>
    <a href="profile.html"><span class="icon-label">Profile</span></a>
  </nav>

  <script>
    var API_BASE = '';
    var history  = [];   // [{role, content}] for multi-turn context
    var userId   = null;
    try {
      var _u = JSON.parse(localStorage.getItem('safetrax_user'));
      userId = _u ? _u.id : localStorage.getItem('safetrax_user_id');
    } catch(e) { userId = localStorage.getItem('safetrax_user_id'); }

    // ── Helpers ───────────────────────────────────────────
    function scrollBottom() {
      var el = document.getElementById('chat-messages');
      el.scrollTop = el.scrollHeight;
    }

    function appendMsg(text, role) {
      var div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      document.getElementById('chat-messages').appendChild(div);
      scrollBottom();
      return div;
    }

    function showTyping() {
      var div = document.createElement('div');
      div.className = 'msg typing';
      div.id = 'typing-indicator';
      div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      document.getElementById('chat-messages').appendChild(div);
      scrollBottom();
    }

    function hideTyping() {
      var el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function setSendEnabled(v) {
      document.getElementById('send-btn').disabled = !v;
    }

    // ── Send message ──────────────────────────────────────
    function sendMessage(text) {
      text = text.trim();
      if (!text) return;

      // Clear chips after first real message
      document.getElementById('quick-replies').innerHTML = '';

      appendMsg(text, 'user');
      history.push({ role: 'user', content: text });

      document.getElementById('chat-input').value = '';
      autoResize();
      setSendEnabled(false);
      showTyping();

      fetch(API_BASE + '/api/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ messages: history, user_id: userId || undefined })
      })
      .then(function(r) {
        if (!r.ok) throw new Error('Server error ' + r.status);
        return r.json();
      })
      .then(function(data) {
        hideTyping();
        var reply = data.reply || 'Sorry, I could not generate a response.';
        appendMsg(reply, 'bot');
        history.push({ role: 'assistant', content: reply });
      })
      .catch(function(err) {
        hideTyping();
        appendMsg('Could not reach the server. Is the backend running? (' + err.message + ')', 'error');
      })
      .finally(function() {
        setSendEnabled(true);
      });
    }

    // ── Auto-resize textarea ──────────────────────────────
    function autoResize() {
      var ta = document.getElementById('chat-input');
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    }

    // ── Event listeners ───────────────────────────────────
    document.getElementById('chat-input').addEventListener('input', autoResize);

    document.getElementById('chat-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(this.value);
      }
    });

    document.getElementById('send-btn').addEventListener('click', function() {
      sendMessage(document.getElementById('chat-input').value);
    });

    document.querySelectorAll('.chip').forEach(function(chip) {
      chip.addEventListener('click', function() {
        sendMessage(this.dataset.q);
      });
    });

    // ── Greeting ──────────────────────────────────────────
    appendMsg(
      "Hi! I'm the SafeTrax Assistant. I can help you understand risk scores, CDC/WHO travel advisories, vaccination requirements, how to create a travel plan, and more. What would you like to know?",
      'bot'
    );
  </script>
</body>
</html>
