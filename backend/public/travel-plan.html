  <title>SafeTrax – Travel plan</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .city-other-input { margin-top: 6px; }
  </style>
</head>
<body>
  <header class="app-header">
    <h1>SafeTrax</h1>
    <p style="font-size: 0.9rem; opacity: 0.95;">Travel plan</p>
  </header>

  <main class="container">
    <form id="travel-form" action="recommendation.html" method="get">
      <div class="card">
        <h2>Destination</h2>
        <p style="font-size:0.9rem;color:var(--text-muted);margin-bottom:0.75rem;">
          Select country → state (US only) → city. Choose "Other" to type a city not listed.
        </p>
        <div id="destinations">
          <!-- First destination row built by JS -->
        </div>
        <button type="button" class="btn btn-outline mt-1" id="add-destination">+ Add another destination</button>
      </div>

      <div class="card">
        <h2>Dates</h2>
        <label for="date-start">Start date</label>
        <input type="date" id="date-start" name="date_start" required>
        <label for="date-end">End date</label>
        <input type="date" id="date-end" name="date_end" required>
      </div>

      <div class="card">
        <h2>Primary transportation</h2>
        <select id="transport" name="transport" required>
          <option value="">Select</option>
          <option value="air">Air</option>
          <option value="car">Car</option>
          <option value="train">Train</option>
          <option value="bus">Bus</option>
          <option value="cruise">Cruise</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="card">
        <h2>Checklist before you go</h2>
        <p style="font-size:0.9rem;color:var(--text-muted);margin-bottom:0.75rem;">Immigration, health, law &amp; weather</p>
        <div class="checklist-group">
          <h4>Immigration</h4>
          <div class="check-item"><input type="checkbox" name="check_immigration_visa" id="c1"><label for="c1">Visa / ESTA / entry requirements</label></div>
          <div class="check-item"><input type="checkbox" name="check_immigration_passport" id="c2"><label for="c2">Passport validity (6+ months)</label></div>
        </div>
        <div class="checklist-group">
          <h4>Health</h4>
          <div class="check-item"><input type="checkbox" name="check_health_vaccine" id="c3"><label for="c3">Vaccinations up to date</label></div>
          <div class="check-item"><input type="checkbox" name="check_health_insurance" id="c4"><label for="c4">Travel health insurance</label></div>
          <div class="check-item"><input type="checkbox" name="check_health_meds" id="c5"><label for="c5">Medications &amp; prescriptions</label></div>
        </div>
        <div class="checklist-group">
          <h4>Law &amp; regulations</h4>
          <div class="check-item"><input type="checkbox" name="check_law" id="c6"><label for="c6">Local laws and customs</label></div>
        </div>
        <div class="checklist-group">
          <h4>Weather</h4>
          <div class="check-item"><input type="checkbox" name="check_weather" id="c7"><label for="c7">Forecast and seasonal risks</label></div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Generate recommendation</button>
    </form>
  </main>

    KR:['Seoul','Busan','Incheon','Daegu','Gyeongju','Jeju','Jeonju'],
    ES:['Madrid','Barcelona','Seville','Valencia','Granada','Bilbao','Málaga','Córdoba','Toledo','Palma de Mallorca','Ibiza','San Sebastián'],
    LK:['Colombo','Kandy','Galle','Nuwara Eliya','Sigiriya','Jaffna'],
    SD:['Khartoum','Omdurman','Port Sudan','Kassala'],
    SE:['Stockholm','Gothenburg','Malmö','Uppsala','Kiruna','Visby'],
    CH:['Zurich','Geneva','Basel','Bern','Lausanne','Lucerne','Interlaken','Zermatt','St. Moritz'],
    SY:['Damascus','Aleppo','Homs','Latakia'],
    TW:['Taipei','Kaohsiung','Taichung','Tainan','Hualien','Taroko'],
    TZ:['Dar es Salaam','Zanzibar','Arusha','Kilimanjaro','Serengeti','Mwanza'],
    TH:['Bangkok','Chiang Mai','Phuket','Pattaya','Koh Samui','Chiang Rai','Ayutthaya','Hua Hin','Krabi','Koh Phi Phi'],
    TN:['Tunis','Sfax','Sousse','Hammamet','Djerba','Kairouan'],
    TR:['Istanbul','Ankara','Izmir','Cappadocia (Göreme)','Antalya','Bodrum','Ephesus','Trabzon','Pamukkale','Gaziantep'],
    UA:['Kyiv','Kharkiv','Odessa','Lviv','Dnipro','Zaporizhzhia'],
    AE:['Dubai','Abu Dhabi','Sharjah','Ajman','Ras Al Khaimah'],
    GB:['London','Edinburgh','Manchester','Birmingham','Glasgow','Liverpool','Bristol','Leeds','Oxford','Cambridge','Bath','York','Brighton','Cardiff','Belfast'],
    UY:['Montevideo','Punta del Este','Colonia del Sacramento'],
    UZ:['Tashkent','Samarkand','Bukhara','Khiva','Ferghana'],
    VN:['Hanoi','Ho Chi Minh City','Da Nang','Hoi An','Hue','Nha Trang','Ha Long Bay','Sapa','Phu Quoc'],
    YE:['Sana\'a','Aden','Taiz','Mukalla'],
    ZM:['Lusaka','Livingstone','Ndola','Kitwe'],
    ZW:['Harare','Bulawayo','Victoria Falls']
  };

  var US_STATES = [
    ['AL','Alabama'],['AK','Alaska'],['AZ','Arizona'],['AR','Arkansas'],
    ['CA','California'],['CO','Colorado'],['CT','Connecticut'],['DE','Delaware'],
    ['FL','Florida'],['GA','Georgia'],['HI','Hawaii'],['ID','Idaho'],
    ['IL','Illinois'],['IN','Indiana'],['IA','Iowa'],['KS','Kansas'],
    ['KY','Kentucky'],['LA','Louisiana'],['ME','Maine'],['MD','Maryland'],
    ['MA','Massachusetts'],['MI','Michigan'],['MN','Minnesota'],['MS','Mississippi'],
    ['MO','Missouri'],['MT','Montana'],['NE','Nebraska'],['NV','Nevada'],
    ['NH','New Hampshire'],['NJ','New Jersey'],['NM','New Mexico'],['NY','New York'],
    ['NC','North Carolina'],['ND','North Dakota'],['OH','Ohio'],['OK','Oklahoma'],
    ['OR','Oregon'],['PA','Pennsylvania'],['RI','Rhode Island'],['SC','South Carolina'],
    ['SD','South Dakota'],['TN','Tennessee'],['TX','Texas'],['UT','Utah'],
    ['VT','Vermont'],['VA','Virginia'],['WA','Washington'],['WV','West Virginia'],
    ['WI','Wisconsin'],['WY','Wyoming'],['OTHER','Other']
  ];

  // ─── Build option strings ────────────────────────────────────────────────────

  var countryOptionsHtml = '<option value="">Select country</option>' +
    COUNTRIES.map(function(x) {
      return '<option value="' + x.c + '">' + x.n + '</option>';
    }).join('');

  var stateOptionsHtml = '<option value="">Select state</option>' +
    US_STATES.map(function(s) {
      return '<option value="' + s[0] + '">' + s[1] + '</option>';
    }).join('');

  // ─── Helpers ─────────────────────────────────────────────────────────────────

  function getCities(countryCode, stateCode) {
    if (!countryCode || countryCode === 'OTHER') return [];
    if (countryCode === 'US') {
      if (!stateCode || stateCode === 'OTHER') return [];
      return (CITIES.US && CITIES.US[stateCode]) || [];
    }
    return CITIES[countryCode] || [];
  }

  function populateCitySelect(select, cities) {
    select.innerHTML = '<option value="">Select city</option>';
    cities.forEach(function(city) {
      var o = document.createElement('option');
      o.value = city;
      o.textContent = city;
      select.appendChild(o);
    });
    var other = document.createElement('option');
    other.value = '__other__';
    other.textContent = 'Other — type your city';
    select.appendChild(other);
  }

  function handleCitySelectChange(row) {
    var citySelect = row.querySelector('.city-select');
    var cityOtherWrap = row.querySelector('.city-other-wrap');
    var cityOtherInput = row.querySelector('.city-other-input');
    var cityHidden = row.querySelector('.city-hidden');

    if (citySelect.value === '__other__') {
      cityOtherWrap.classList.remove('hidden');
      cityOtherInput.focus();
      cityHidden.value = '';
    } else {
      cityOtherWrap.classList.add('hidden');
      cityOtherInput.value = '';
      cityHidden.value = citySelect.value;
    }
  }

  function updateCityPanel(row) {
    var countryVal = row.querySelector('.country-select').value;
    var stateVal   = (row.querySelector('.state-select') || {}).value || '';
    var cityWrap   = row.querySelector('.city-wrap');
    var citySelect = row.querySelector('.city-select');
    var cityHidden = row.querySelector('.city-hidden');
    var cityOtherWrap = row.querySelector('.city-other-wrap');
    var cityOtherInput = row.querySelector('.city-other-input');

    if (!countryVal) {
      cityWrap.classList.add('hidden');
      cityHidden.value = '';
      return;
    }

    if (countryVal === 'US' && !stateVal) {
      cityWrap.classList.add('hidden');
      cityHidden.value = '';
      return;
    }

    var cities = getCities(countryVal, stateVal);
    cityWrap.classList.remove('hidden');

    if (cities.length === 0) {
      // No preset cities — go straight to text input
      citySelect.classList.add('hidden');
      cityOtherWrap.classList.remove('hidden');
      citySelect.value = '__other__';
    } else {
      citySelect.classList.remove('hidden');
      populateCitySelect(citySelect, cities);
      citySelect.value = '';
      cityOtherWrap.classList.add('hidden');
      cityOtherInput.value = '';
      cityHidden.value = '';
    }
  }

  // Nominatim live autocomplete for the free-text input
  function setupNominatim(textInput, datalistId, getCountry, getState) {
    var debounce;
    textInput.addEventListener('input', function() {
      var q = textInput.value.trim();
      if (q.length < 2) return;
      var cc = getCountry();
      if (!cc || cc === 'OTHER') return;
      clearTimeout(debounce);
      debounce = setTimeout(function() {
        var search = (cc === 'US' && getState()) ? q + ', ' + getState() : q;
        var url = 'https://nominatim.openstreetmap.org/search?q=' +
          encodeURIComponent(search) + '&countrycodes=' + cc.toLowerCase() +
          '&format=json&addressdetails=1&limit=8';
        fetch(url, { headers: { 'Accept': 'application/json', 'User-Agent': 'SafeTrax/1.0' } })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            var dl = document.getElementById(datalistId);
            if (!dl) return;
            dl.innerHTML = '';
            var seen = {};
            (data || []).forEach(function(item) {
              var a = item.address || {};
              var city = a.city || a.town || a.village || a.county || item.name || '';
              var label = city;
              if (a.state) label += (label ? ', ' : '') + a.state;
              if (!seen[label] && label) {
                seen[label] = true;
                var o = document.createElement('option');
                o.value = label;
                dl.appendChild(o);
              }
            });
          })
          .catch(function() {});
      }, 350);
    });

    // Keep hidden input in sync as user types
    textInput.addEventListener('input', function() {
      var hidden = textInput.closest('.destination-row').querySelector('.city-hidden');
      if (hidden) hidden.value = textInput.value;
    });
  }

  // ─── Build a destination row ─────────────────────────────────────────────────

  var destCount = 0;

  function buildDestRow(removable) {
    destCount++;
    var n = destCount;

    var row = document.createElement('div');
    row.className = 'destination-row';
    row.setAttribute('data-dest', n);

    row.innerHTML =
      '<div class="dest-fields">' +
        '<label for="country_' + n + '" class="sr-only">Country</label>' +
        '<select name="country_' + n + '" id="country_' + n + '" class="country-select">' +
          countryOptionsHtml +
        '</select>' +

        // US state selector
        '<div class="state-wrap hidden" id="state-wrap-' + n + '">' +
          '<label for="state_' + n + '" class="sr-only">State</label>' +
          '<select name="state_' + n + '" id="state_' + n + '" class="state-select" disabled>' +
            stateOptionsHtml +
          '</select>' +
        '</div>' +

        // City area (hidden until country chosen)
        '<div class="city-wrap hidden" id="city-wrap-' + n + '">' +
          '<label for="city_select_' + n + '">City</label>' +
          '<select id="city_select_' + n + '" class="city-select">' +
            '<option value="">Select city</option>' +
            '<option value="__other__">Other — type your city</option>' +
          '</select>' +
          // Hidden field actually submitted
          '<input type="hidden" name="city_' + n + '" class="city-hidden">' +
          // Free-text fallback
          '<div class="city-other-wrap hidden">' +
            '<input type="text" id="city_other_' + n + '" class="city-other-input"' +
              ' placeholder="Type your city…"' +
              ' list="city-dl-' + n + '" autocomplete="off">' +
            '<datalist id="city-dl-' + n + '"></datalist>' +
          '</div>' +
        '</div>' +
      '</div>' +
      (removable ? '<button type="button" class="btn btn-outline remove-dest">Remove</button>' : '');

    // Wire up events
    var countrySel = row.querySelector('.country-select');
    var stateSel   = row.querySelector('.state-select');
    var citySelect = row.querySelector('.city-select');
    var otherInput = row.querySelector('.city-other-input');
    var stateWrap  = row.querySelector('.state-wrap');

    countrySel.addEventListener('change', function() {
      if (countrySel.value === 'US') {
        stateWrap.classList.remove('hidden');
        stateSel.removeAttribute('disabled');
        stateSel.value = '';
        row.querySelector('.city-wrap').classList.add('hidden');
        row.querySelector('.city-hidden').value = '';
      } else {
        stateWrap.classList.add('hidden');
        stateSel.value = '';
        stateSel.setAttribute('disabled', 'disabled');
        updateCityPanel(row);
      }
    });

    stateSel.addEventListener('change', function() {
      updateCityPanel(row);
    });

    citySelect.addEventListener('change', function() {
      handleCitySelectChange(row);
    });

    setupNominatim(
      otherInput,
      'city-dl-' + n,
      function() { return countrySel.value; },
      function() { return stateSel.value; }
    );

    if (removable) {
      row.querySelector('.remove-dest').addEventListener('click', function() {
        row.remove();
      });
    }

    return row;
  }

  // ─── Init ────────────────────────────────────────────────────────────────────

  document.getElementById('destinations').appendChild(buildDestRow(false));

  document.getElementById('add-destination').addEventListener('click', function() {
    document.getElementById('destinations').appendChild(buildDestRow(true));
  });

  // Prevent submitting if no city selected for a shown city panel
  document.getElementById('travel-form').addEventListener('submit', function(e) {
    var rows = document.querySelectorAll('#destinations .destination-row');
    var ok = true;
    rows.forEach(function(row) {
      var countryVal = row.querySelector('.country-select').value;
      if (!countryVal) return; // blank row is fine — skip
      var cityWrap = row.querySelector('.city-wrap');
      if (cityWrap.classList.contains('hidden')) return; // city not yet shown
      var hidden = row.querySelector('.city-hidden');
      var otherInput = row.querySelector('.city-other-input');
      // If "other" path — use text input value
      if (!hidden.value && otherInput && !otherInput.classList.contains('hidden')) {
        hidden.value = otherInput.value.trim();
      }
      // No city chosen and city panel is visible
      if (!hidden.value) {
        ok = false;
        cityWrap.querySelector('.city-select').focus();
      }
    });
    if (!ok) {
      e.preventDefault();
      alert('Please select or enter a city for each destination.');
    }
  });
  </script>
</body>
</html>
